<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - ShopHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    /* Same shared styles as login.html */
    :root {
      --primary: #f97316;
      --primary-dark: #ea580c;
      --primary-light: #fdba74;
      --secondary: #f59e0b;
      --dark: #1f2937;
      --light: #fff7ed;
      --gray: #6b7280;
      --gray-light: #f3f4f6;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --radius: 1rem;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #fff7ed 0%, #ffedd5 100%);
      color: var(--dark);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .container { max-width: 1280px; margin: 0 auto; padding: 0 1.5rem; }

    .header {
      padding: 1.5rem 0;
      border-bottom: 3px solid var(--primary);
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
    }

    .header-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-decoration: none;
    }

    .header-actions { display: flex; gap: 1rem; align-items: center; }

    .icon-btn {
      background: rgba(249, 115, 22, 0.08);
      border: none;
      cursor: pointer;
      padding: 0.6rem;
      border-radius: 50%;
      transition: var(--transition);
      font-size: 1.3rem;
    }

    .icon-btn:hover { background: rgba(249, 115, 22, 0.2); transform: scale(1.1); }

    /* Auth Card */
    .auth-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .auth-card {
      background: white;
      border-radius: var(--radius);
      padding: 3rem;
      max-width: 460px;
      width: 100%;
      box-shadow: var(--shadow);
      animation: scaleIn 0.5s ease-out;
    }

    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    .auth-card .logo-text {
      text-align: center;
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .auth-card h2 {
      text-align: center;
      font-size: 1.75rem;
      margin-bottom: 0.5rem;
    }

    .auth-card .subtitle {
      text-align: center;
      color: var(--gray);
      margin-bottom: 2rem;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .form-group { margin-bottom: 1.5rem; }

    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
    }

    .form-group input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 2px solid #e5e7eb;
      border-radius: 0.75rem;
      font-size: 1rem;
      transition: var(--transition);
      background: white;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.1);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 9999px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: var(--transition);
      text-decoration: none;
      width: 100%;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      box-shadow: 0 4px 15px rgba(249, 115, 22, 0.4);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(249, 115, 22, 0.5);
    }

    .auth-divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
      color: var(--gray);
    }

    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e5e7eb;
    }

    .social-login {
      display: flex;
      gap: 1rem;
    }

    .social-login .btn {
      flex: 1;
      justify-content: center;
      background: var(--gray-light);
      color: var(--dark);
      font-size: 0.9rem;
    }

    .social-login .btn:hover { background: #e5e7eb; }

    .auth-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.95rem;
      color: var(--gray);
    }

    .auth-footer a { color: var(--primary); font-weight: 600; text-decoration: none; }
    .auth-footer a:hover { text-decoration: underline; }

    /* Password strength indicator */
    .password-strength {
      height: 4px;
      border-radius: 2px;
      margin-top: 0.5rem;
      background: #e5e7eb;
      transition: var(--transition);
    }

    .password-strength.weak { background: var(--danger); width: 33%; }
    .password-strength.medium { background: var(--warning); width: 66%; }
    .password-strength.strong { background: var(--success); width: 100%; }

    /* Footer */
    .footer {
      background: linear-gradient(135deg, #1f2937 0%, #111827 100%);
      color: #9ca3af;
      padding: 2rem 0 1.5rem;
      margin-top: auto;
    }

    .footer-bottom {
      border-top: 1px solid #374151;
      padding-top: 1.5rem;
      text-align: center;
      font-size: 0.875rem;
    }

    @media (max-width: 480px) {
      .auth-card { padding: 2rem; }
      .form-row { grid-template-columns: 1fr; }
      .social-login { flex-direction: column; }
    }
  </style>
</head>
<body>

<!-- ========== MINIMAL HEADER ========== -->
<header class="header">
  <div class="container">
    <div class="header-inner">
      <a href="index.html" class="logo">🛍️ ShopHub</a>
      <div class="header-actions">
        <button class="icon-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
        <a href="cart.html" class="icon-btn">🛒</a>
      </div>
    </div>
  </div>
</header>

<!-- ========== REGISTER FORM ========== -->
<div class="auth-container">
  <div class="auth-card">
    <div class="logo-text">🛍️ ShopHub</div>
    <h2>Create Account</h2>
    <p class="subtitle">Join us and start shopping today</p>

    <form onsubmit="event.preventDefault(); alert('Registration successful! Please login.'); window.location.href='login.html';">
      <div class="form-row">
        <div class="form-group">
          <label for="firstName">First Name</label>
          <input type="text" id="firstName" placeholder="John" required>
        </div>
        <div class="form-group">
          <label for="lastName">Last Name</label>
          <input type="text" id="lastName" placeholder="Doe" required>
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Create a strong password" required oninput="updatePasswordStrength(this.value)">
        <div class="password-strength" id="passwordStrength"></div>
        <p style="font-size: 0.8rem; color: var(--gray); margin-top: 0.25rem;">Minimum 8 characters</p>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
      </div>

      <div style="margin-bottom: 1.5rem; font-size: 0.9rem;">
        <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
          <input type="checkbox" required> I agree to the <a href="#" style="color: var(--primary);">Terms of Service</a> and <a href="#" style="color: var(--primary);">Privacy Policy</a>
        </label>
      </div>

      <button type="submit" class="btn btn-primary">Create Account →</button>
    </form>

    <div class="auth-divider">or continue with</div>

    <div class="social-login">
      <button class="btn" onclick="alert('Google registration coming soon!')">🅶 Google</button>
      <button class="btn" onclick="alert('Facebook registration coming soon!')">🅵 Facebook</button>
    </div>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Sign In</a>
    </div>
  </div>
</div>

<!-- ========== FOOTER ========== -->
<footer class="footer">
  <div class="container">
    <div class="footer-bottom"><p>© 2024 ShopHub. All rights reserved.</p></div>
  </div>
</footer>

<script>
  function updatePasswordStrength(password) {
    const indicator = document.getElementById('passwordStrength');
    const strength = password.length >= 8 ? 
      (password.length >= 12 ? 'strong' : 'medium') : 'weak';
    indicator.className = `password-strength ${strength}`;
  }

  function toggleTheme() {
    document.body.classList.toggle('dark');
    const btn = document.getElementById('themeBtn');
    btn.textContent = document.body.classList.contains('dark') ? '☀️' : '🌙';
  }

  document.addEventListener('DOMContentLoaded', () => {
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark') {
      document.body.classList.add('dark');
      document.getElementById('themeBtn').textContent = '☀️';
    }

    // Password confirmation validation
    const password = document.getElementById('password');
    const confirm = document.getElementById('confirmPassword');
    confirm.addEventListener('input', () => {
      if (password.value !== confirm.value) {
        confirm.setCustomValidity('Passwords do not match');
      } else {
        confirm.setCustomValidity('');
      }
    });
  });
</script>
</body>
</html>
